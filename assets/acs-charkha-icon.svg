<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Charkha (Spinning Wheel) Brand Icon -->
  <!-- Outer rim -->
  <circle cx="60" cy="60" r="55" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
  <!-- Inner rim -->
  <circle cx="60" cy="60" r="42" stroke="currentColor" stroke-width="1"/>
  <!-- Hub -->
  <circle cx="60" cy="60" r="8" fill="currentColor" opacity="0.6"/>
  <circle cx="60" cy="60" r="4" fill="currentColor"/>
  <!-- Main spokes (8) -->
  <line x1="60" y1="5" x2="60" y2="115" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
  <line x1="5" y1="60" x2="115" y2="60" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
  <line x1="20.15" y1="20.15" x2="99.85" y2="99.85" stroke="currentColor" stroke-width="1" opacity="0.45"/>
  <line x1="99.85" y1="20.15" x2="20.15" y2="99.85" stroke="currentColor" stroke-width="1" opacity="0.45"/>
  <!-- Secondary spokes (8) -->
  <line x1="39" y1="6.5" x2="81" y2="113.5" stroke="currentColor" stroke-width="0.7" opacity="0.3"/>
  <line x1="81" y1="6.5" x2="39" y2="113.5" stroke="currentColor" stroke-width="0.7" opacity="0.3"/>
  <line x1="6.5" y1="39" x2="113.5" y2="81" stroke="currentColor" stroke-width="0.7" opacity="0.3"/>
  <line x1="6.5" y1="81" x2="113.5" y2="39" stroke="currentColor" stroke-width="0.7" opacity="0.3"/>
  <!-- Decorative dashed ring -->
  <circle cx="60" cy="60" r="26" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3 5" opacity="0.35"/>
  <!-- Handle -->
  <line x1="60" y1="115" x2="60" y2="118" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
